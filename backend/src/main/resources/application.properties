# Configuración de la aplicación
server.port=8080
spring.application.name=pedidos-api

# Configuración de PostgreSQL (sobreescribible vía variables de entorno)
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/pedidos}
spring.datasource.username=${DB_USERNAME:pedidos}
spring.datasource.password=${DB_PASSWORD:pedidos123}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Actuator - endpoints de salud
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
