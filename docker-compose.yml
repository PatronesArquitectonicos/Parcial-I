# ============================================
# Docker Compose - Sistema de Gestión de Pedidos
# PostgreSQL + Spring Boot Backend + React Frontend
# ============================================

services:
  # ---- Base de Datos PostgreSQL ----
  db:
    image: postgres:16-alpine
    container_name: pedidos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: pedidos
      POSTGRES_USER: pedidos
      POSTGRES_PASSWORD: pedidos123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pedidos -d pedidos"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pedidos-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---- Backend - Spring Boot API ----
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pedidos-backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:postgresql://db:5432/pedidos
      DB_USERNAME: pedidos
      DB_PASSWORD: pedidos123
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    networks:
      - pedidos-network
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  # ---- Frontend - React + Nginx ----
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pedidos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - pedidos-network
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 128M

volumes:
  postgres_data:
    driver: local

networks:
  pedidos-network:
    driver: bridge
