global:
  security:
    allowInsecureImages: true

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "16.4.0-debian-12-r9"

backend:
  replicas: 2
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
  image:
    tag: "1.0.0"

frontend:
  replicas: 2
  image:
    tag: "1.0.0"

ingress:
  host: "prod.pedidos.local"