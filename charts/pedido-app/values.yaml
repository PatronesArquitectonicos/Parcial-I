# Nombres estables dentro del namespace
global:
  security:
    allowInsecureImages: true

postgresql:
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: "16.4.0-debian-12-r9"
  fullnameOverride: db
  auth:
    database: pedidos
    username: pedidos

    # OBLIGATORIO: la password NO va en Git; se toma de este Secret del cluster
    existingSecret: db-credentials
    secretKeys:
      # Bitnami usa estas keys cuando se usa existingSecret (admin + user)
      adminPasswordKey: postgres-password
      userPasswordKey: password

  primary:
    persistence:
      enabled: true
      size: 1Gi
    initdb:
      # El SQL va en un ConfigMap (sin INSERTs), y el ConfigMap toma el archivo charts/pedido-app/files/init.sql
      scriptsConfigMap: db-init

backend:
  fullnameOverride: backend

  image:
    repository: carlos22709/pedidos-backend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicas: 1

  service:
    port: 8080

  resources:
    requests:
      cpu: "250m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

  db:
    host: db
    port: 5432
    name: pedidos

  # OBLIGATORIO: Secret ya creado en el namespace (no en Git)
  existingSecret: db-credentials
  secretKeys:
    usernameKey: username
    passwordKey: password

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 60

frontend:
  fullnameOverride: frontend

  image:
    repository: carlos22709/pedidos-frontend
    tag: "1.0.0"
    pullPolicy: IfNotPresent

  replicas: 1

  service:
    port: 80

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "256Mi"

ingress:
  enabled: true
  className: nginx
  host: ""  # vacío = funciona por IP/hostname del LoadBalancer